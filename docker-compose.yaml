# Default local profile: loopback-only. Public reverse proxies are not enabled.
# Authenticated non-loopback profiles are out of scope and must not be the default.
services:
  healthadvocate:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      HEALTHADVOCATE_MODEL_ENABLED: "0"
      HEALTHADVOCATE_MODEL_URL: "http://127.0.0.1:11434/v1"
    restart: unless-stopped
